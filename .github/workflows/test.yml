name: Portfolio

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      

jobs:
  test:
    runs-on: ubuntu-latest
    container: 
      image: node:24
    steps:
      - uses: actions/checkout@v4
      #- uses: actions/setup-node@v4  
       # with:
       #   node-version: 20
      - run: npm ci
      #- run: npx playwright install --with-deps
      #- run: npx playwright test
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: test-report
          retention-days: 30
